<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Redirecting to YUCP Club Packages</title>
  <meta http-equiv="refresh" content="0; url=https://vpm.yucp.club/">
  <link rel="canonical" href="https://vpm.yucp.club/">
  <script>
    (() => {
      const target = new URL('https://vpm.yucp.club/');
      target.search = window.location.search;
      target.hash = window.location.hash;
      window.location.replace(target.toString());
    })();
  </script>
</head>
<body>
  <p>Redirecting to <a href="https://vpm.yucp.club/">https://vpm.yucp.club/</a>...</p>
</body>
</html>
